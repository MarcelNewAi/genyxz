<!doctype html>
<html lang="sl">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Stran ne obstaja | GenYXZ</title>
    <style>
      :root {
        --bg: #F0F4F8;
        --text: #133156;
        --primary: #43D1AB;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--bg);
        color: var(--text);
        font-family: Inter, Arial, sans-serif;
      }

      main {
        width: min(640px, calc(100% - 2rem));
        padding: 2rem;
        border-radius: 1rem;
        background: #ffffff;
        border: 1px solid rgba(19, 49, 86, 0.12);
        text-align: center;
      }

      h1 {
        margin: 0 0 0.75rem;
        font-family: Poppins, Inter, Arial, sans-serif;
        color: var(--text);
      }

      p {
        margin: 0 0 1.5rem;
      }

      a {
        display: inline-block;
        min-height: 44px;
        line-height: 44px;
        padding: 0 1rem;
        border-radius: 0.75rem;
        text-decoration: none;
        background: var(--primary);
        color: #0b2632;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Stran ne obstaja</h1>
      <p>Ups, ta stran ne obstaja.</p>
      <a href="https://www.genyxz.si">Nazaj na genyxz.si</a>
    </main>
  </body>
</html>
